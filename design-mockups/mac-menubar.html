<!-- @dsCard group="macOS" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>macOS · Popover menubar</title>
<style>
  :root{
    --accent:#0a84ff; --green:#34c759; --amber:#ff9f0a; --red:#ff3b30;
    --label:#1d1d1f; --label2:#86868b; --label3:#aeaeb2;
    --sep:rgba(0,0,0,.08);
    font-family:-apple-system,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
  svg{display:block}
  /* desktop backdrop with menu bar */
  body{min-height:560px;background:
    linear-gradient(160deg,#3a6ea5 0%,#6b4e9e 55%,#9e4e7e 100%);
    display:flex;justify-content:flex-end;padding-top:0}
  .menubar{position:fixed;top:0;left:0;right:0;height:25px;background:rgba(255,255,255,.55);
    backdrop-filter:blur(30px);display:flex;align-items:center;gap:18px;padding:0 14px;
    font-size:13px;color:#1d1d1f;border-bottom:1px solid rgba(0,0,0,.06);z-index:10}
  .menubar .apple{font-weight:700;font-size:15px}
  .menubar .sp{flex:1}
  .menubar .mi{font-weight:500}
  .menubar .active{display:flex;align-items:center;gap:5px;color:var(--accent)}
  /* popover */
  .pop{width:340px;margin:33px 12px 0 0;background:rgba(246,246,248,.82);
    backdrop-filter:blur(40px) saturate(180%);border-radius:14px;
    box-shadow:0 16px 50px rgba(0,0,0,.32),0 0 0 .5px rgba(0,0,0,.12);
    overflow:hidden;position:relative}
  .pop::before{content:"";position:absolute;top:-7px;right:34px;width:14px;height:14px;
    background:inherit;transform:rotate(45deg);border-radius:3px 0 0 0;
    box-shadow:-1px -1px 0 rgba(0,0,0,.04)}
  .head{padding:15px 16px 13px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--sep)}
  .head .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(145deg,#0a84ff,#5e5ce6);
    display:grid;place-items:center;box-shadow:0 2px 6px rgba(10,132,255,.4)}
  .head .ttl{font-size:14px;font-weight:600}
  .head .sub{font-size:11.5px;color:var(--label2);margin-top:1px;display:flex;align-items:center;gap:5px}
  .head .live{width:7px;height:7px;border-radius:50%;background:var(--green)}
  /* stat row */
  .stats{display:flex;padding:14px 10px;gap:8px}
  .stat{flex:1;text-align:center;padding:8px 4px;border-radius:9px}
  .stat .n{font-size:23px;font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums;color:var(--label)}
  .stat .l{font-size:11px;color:var(--label2);margin-top:1px}
  .stat.act{background:rgba(10,132,255,.1)} .stat.act .n{color:var(--accent)}
  /* current job */
  .now{margin:2px 12px 12px;background:rgba(255,255,255,.7);border-radius:11px;padding:12px 13px;
    box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .now .top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .now .wave{color:var(--accent)}
  .now .nm{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .now .pct{font-size:12px;color:var(--label2);font-variant-numeric:tabular-nums}
  .bar{height:6px;border-radius:3px;background:rgba(0,0,0,.08);overflow:hidden}
  .bar span{display:block;height:100%;width:47%;border-radius:3px;
    background:linear-gradient(90deg,#0a84ff,#5e9eff)}
  .now .stage{font-size:11px;color:var(--label2);margin-top:7px}
  /* last acta */
  .last{margin:0 12px 12px;display:flex;align-items:center;gap:10px;padding:11px 13px;
    background:rgba(255,255,255,.7);border-radius:11px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .last .ok{width:26px;height:26px;flex:none}
  .last .nm{font-size:13px;font-weight:600}
  .last .mt{font-size:11px;color:var(--label2);margin-top:1px}
  .last .open{margin-left:auto;color:var(--accent)}
  /* footer actions */
  .foot{border-top:1px solid var(--sep);padding:6px}
  .act-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;font-size:13px;color:var(--label);cursor:default}
  .act-row:hover{background:rgba(10,132,255,.12)}
  .act-row svg{color:var(--label2)}
  .act-row .k{margin-left:auto;font-size:11px;color:var(--label3)}
</style>
</head>
<body>
  <div class="menubar">
    <span class="apple"></span><span class="mi" style="font-weight:600">Finder</span>
    <span class="mi">Archivo</span><span class="mi">Edición</span><span class="mi">Visualización</span>
    <span class="sp"></span>
    <span class="active">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h9l5 5v13a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z"/><path d="M14 2v6h6"/></svg>
    </span>
    <span class="mi">100%</span><span class="mi">Vie 12:04</span>
  </div>

  <div class="pop">
    <div class="head">
      <div class="logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h9l5 5v13a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z"/><path d="M14 2v6h6"/></svg></div>
      <div><div class="ttl">TransLocalAI</div>
        <div class="sub"><span class="live"></span> Procesando · iCloud al día</div></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="n">2</div><div class="l">En cola</div></div>
      <div class="stat act"><div class="n">1</div><div class="l">Procesando</div></div>
      <div class="stat"><div class="n">5</div><div class="l">Hechas hoy</div></div>
    </div>

    <div class="now">
      <div class="top">
        <span class="wave"><svg width="20" height="16" viewBox="0 0 28 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h2M7 8v8M11 4v16M15 7v10M19 9v6M23 11h2"/></svg></span>
        <span class="nm">Touchpoint Dinalan SCADA</span><span class="pct">47%</span>
      </div>
      <div class="bar"><span></span></div>
      <div class="stage">Transcribiendo · whisper-large-v3</div>
    </div>

    <div class="last">
      <span class="ok"><svg width="26" height="26" viewBox="0 0 24 24" fill="#34c759"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm-1.2 14.2l-4-4 1.4-1.4 2.6 2.6 5.6-5.6 1.4 1.4z"/></svg></span>
      <div><div class="nm">Seguimiento semanal MTPL</div><div class="mt">Acta lista · hace 8 min</div></div>
      <span class="open"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg></span>
    </div>

    <div class="foot">
      <div class="act-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg> Abrir ventana<span class="k">⌘O</span></div>
      <div class="act-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M5 13v5a2 2 0 002 2h10a2 2 0 002-2v-5"/></svg> Enviar audio…</div>
      <div class="act-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke-linecap="round"/></svg> Ajustes…<span class="k">⌘,</span></div>
    </div>
  </div>
</body>
</html>
